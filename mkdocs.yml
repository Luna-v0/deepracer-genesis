site_name: DeepRacer-Genesis
site_description: AWS DeepRacer RL on Genesis — GPU-batched physics, TorchRL, config-as-code experiments
repo_url: https://github.com/Luna-v0/deepracer-genesis
repo_name: Luna-v0/deepracer-genesis

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-night
        name: Light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Dark mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            members_order: source

nav:
  - Home: index.md
  - Tutorial: tutorial.md
  - Concepts:
      - Experiments & the >> DSL: concepts/experiments.md
      - Domain randomization: concepts/domain-randomization.md
      - Renderers: concepts/renderers.md
      - Tracks: concepts/tracks.md
      - Rewards & actions: concepts/rewards-actions.md
  - Guides:
      - Custom algorithms: guides/custom-algorithms.md
      - Dataset collection: guides/datasets.md
      - HPO: guides/hpo.md
      - Deployment (ONNX): guides/deployment.md
  - API:
      - experiment: api/experiment.md
      - algorithms: api/algorithms.md
      - agents: api/agents.md
      - datasets: api/datasets.md
      - deploy: api/deploy.md
      - envs: api/envs.md
      - tools: api/tools.md
